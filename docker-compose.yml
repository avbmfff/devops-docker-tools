services:
  petclinic:
    image: springcommunity/spring-petclinic-rest
    ports:
      - "9966:9966"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres,spring-data-jpa
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/petclinic
      - SPRING_DATASOURCE_USERNAME=petclinic
      - SPRING_DATASOURCE_PASSWORD=petclinic
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/petclinic
      - SPRING_FLYWAY_USER=petclinic
      - SPRING_FLYWAY_PASSWORD=petclinic
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:16.3
    environment:
      - POSTGRES_USER=petclinic
      - POSTGRES_PASSWORD=petclinic
      - POSTGRES_DB=petclinic
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migration:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: always

volumes:
  postgres-data:
    driver: local
